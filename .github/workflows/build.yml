name: Build Booster FF APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 📦 Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar || \
          curl -L "https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          ls -la gradle/wrapper/

      - name: 🔑 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 🧹 Clean project
        run: ./gradlew clean --no-daemon

      - name: 🔨 Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 📋 List APK files
        run: find . -name "*.apk" -type f

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BoosterFF-Anti-Lag-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: 🏷️ Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "🚀 Booster FF Anti Lag v1.0.${{ github.run_number }}"
          body: |
            ## ⚡ Booster FF Anti Lag Pro
            
            ### ✨ المميزات:
            - 🚀 تحسين RAM وأداء الجهاز بضغطة واحدة
            - 🗑️ مسح الكاش التلقائي
            - ⛔ إيقاف التطبيقات في الخلفية
            - 📊 مراقبة الأداء المباشر
            - 🔔 خدمة تعمل في الخلفية تلقائياً
            - 💰 إعلانات AdMob مدمجة
            
            ### 📱 متطلبات:
            - Android 5.0+ (API 21)
          files: app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
